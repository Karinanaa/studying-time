<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study Tracker & Time Log</title>
    <style>
        :root {
            --bg-color: #0b0f19;
            --card-bg: #161f33;
            --text-main: #f0f5ff;
            --text-muted: #8a9fc2;
            --miku-cyan: #00f3ff;
            --miku-green: #00ffcc;
            --accent-glow: rgba(0, 243, 255, 0.2);
            --border-color: #24355a;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem 1rem;
        }

        .container {
            width: 100%;
            max-width: 800px;
        }

        header {
            text-align: center;
            margin-bottom: 2.5rem;
            position: relative;
        }

        header h1 {
            font-size: 2.2rem;
            font-weight: 700;
            color: var(--text-main);
            letter-spacing: 2px;
            text-transform: uppercase;
            text-shadow: 0 0 10px var(--accent-glow);
            margin-bottom: 0.5rem;
        }

        header h1 span {
            color: var(--miku-cyan);
        }

        header p {
            color: var(--text-muted);
            font-size: 0.95rem;
        }

        /* 互斥状态栏 */
        .status-bar {
            background: rgba(22, 31, 51, 0.6);
            border: 1px solid var(--border-color);
            padding: 0.8rem 1.2rem;
            border-radius: 12px;
            margin-bottom: 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.9rem;
        }

        .status-mode {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text-muted);
        }

        .status-mode .dot {
            width: 8px;
            height: 8px;
            background-color: var(--miku-green);
            border-radius: 50%;
            box-shadow: 0 0 8px var(--miku-green);
        }

        /* 学科卡片布局 */
        .subjects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .subject-card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 1.5rem;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            position: relative;
            overflow: hidden;
        }

        .subject-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 4px;
            height: 100%;
            background: transparent;
            transition: background 0.3s;
        }

        .subject-card.active {
            border-color: var(--miku-cyan);
            box-shadow: 0 4px 20px var(--accent-glow);
        }

        .subject-card.active::before {
            background: linear-gradient(to bottom, var(--miku-cyan), var(--miku-green));
        }

        .subject-info {
            margin-bottom: 1.2rem;
        }

        .subject-name {
            font-size: 1.2rem;
            font-weight: 600;
            color: var(--text-main);
            margin-bottom: 0.4rem;
            text-transform: capitalize;
        }

        .subject-name.computer {
            color: var(--miku-cyan);
        }

        .time-display {
            font-family: "Courier New", Courier, monospace;
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--text-main);
            letter-spacing: 1px;
            margin-top: 0.5rem;
        }

        .subject-card.active .time-display {
            color: var(--miku-green);
            text-shadow: 0 0 8px rgba(0, 255, 204, 0.3);
        }

        /* 控制按钮 */
        .btn-control {
            width: 100%;
            background: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 0.75rem;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-control:hover {
            background-color: rgba(255, 255, 255, 0.05);
            border-color: var(--text-muted);
        }

        .subject-card.active .btn-control {
            background: linear-gradient(135deg, rgba(0, 243, 255, 0.1), rgba(0, 255, 204, 0.1));
            border-color: var(--miku-cyan);
            color: var(--miku-cyan);
        }

        .subject-card.active .btn-control:hover {
            background: linear-gradient(135deg, rgba(0, 243, 255, 0.2), rgba(0, 255, 204, 0.2));
        }

        /* 总计面板 */
        .total-panel {
            background: linear-gradient(135deg, #161f33 0%, #111827 100%);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 1.5rem;
            text-align: center;
            margin-top: 1rem;
        }

        .total-title {
            font-size: 1rem;
            color: var(--text-muted);
            margin-bottom: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .total-time {
            font-family: "Courier New", Courier, monospace;
            font-size: 2.4rem;
            font-weight: bold;
            color: var(--miku-cyan);
            text-shadow: 0 0 15px rgba(0, 243, 255, 0.4);
        }

        footer {
            margin-top: auto;
            padding-top: 2rem;
            color: var(--text-muted);
            font-size: 0.8rem;
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>STUDY <span>TRACKER</span></h1>
            <p>持续沉淀 · 无法重置的千小时大计划</p>
        </header>

        <div class="status-bar">
            <div class="status-mode">
                <div class="dot"></div>
                <span>互斥模式已启用 (开启一门会自动暂停其他)</span>
            </div>
            <div style="color: var(--text-muted);">状态: 运行中</div>
        </div>

        <div class="subjects-grid">
            <div class="subject-card" id="card-math">
                <div class="subject-info">
                    <div class="subject-name">Mathematics</div>
                    <div class="time-display" id="time-math">0000:00:00</div>
                </div>
                <button class="btn-control" onclick="toggleTimer('math')">
                    <span class="icon" id="icon-math">▶</span> <span id="text-math">开始计时</span>
                </button>
            </div>

            <div class="subject-card" id="card-physics">
                <div class="subject-info">
                    <div class="subject-name">Physics</div>
                    <div class="time-display" id="time-physics">0000:00:00</div>
                </div>
                <button class="btn-control" onclick="toggleTimer('physics')">
                    <span class="icon" id="icon-physics">▶</span> <span id="text-physics">开始计时</span>
                </button>
            </div>

            <div class="subject-card" id="card-computer">
                <div class="subject-info">
                    <div class="subject-name computer">computer</div>
                    <div class="time-display" id="time-computer">0000:00:00</div>
                </div>
                <button class="btn-control" onclick="toggleTimer('computer')">
                    <span class="icon" id="icon-computer">▶</span> <span id="text-computer">开始计时</span>
                </button>
            </div>
        </div>

        <div class="total-panel">
            <div class="total-title">Total Study Time</div>
            <div class="total-time" id="time-total">0000:00:00</div>
        </div>
    </div>

    <footer>
        <p>主体核心驱动 · 外部大脑协助构建</p>
    </footer>

    <script>
        // 初始化每个学科的秒数，优先从本地浏览器缓存（localStorage）读取
        let timers = {
            math: parseInt(localStorage.getItem('timer_math')) || 0,
            physics: parseInt(localStorage.getItem('timer_physics')) || 0,
            computer: parseInt(localStorage.getItem('timer_computer')) || 0
        };

        // 读取上次刷新的活动状态
        let activeSubject = localStorage.getItem('active_subject') || null;
        let intervalId = null;
        let lastUpdateTime = Date.now();

        // 格式化秒数为 HHHH:MM:SS 格式
        function formatTime(totalSeconds) {
            const hours = Math.floor(totalSeconds / 3600);
            const minutes = Math.floor((totalSeconds % 3600) / 60);
            const seconds = totalSeconds % 60;

            const paddedHours = String(hours).padStart(4, '0');
            const paddedMinutes = String(minutes).padStart(2, '0');
            const paddedSeconds = String(seconds).padStart(2, '0');

            return `${paddedHours}:${paddedMinutes}:${paddedSeconds}`;
        }

        // 全局UI同步刷新
        function updateDisplay() {
            let totalSeconds = 0;
            
            for (let sub in timers) {
                document.getElementById(`time-${sub}`).innerText = formatTime(timers[sub]);
                totalSeconds += timers[sub];

                const card = document.getElementById(`card-${sub}`);
                const icon = document.getElementById(`icon-${sub}`);
                const text = document.getElementById(`text-${sub}`);

                if (sub === activeSubject) {
                    card.classList.add('active');
                    icon.innerText = '⏸';
                    text.innerText = '暂停计时';
                } else {
                    card.classList.remove('active');
                    icon.innerText = '▶';
                    text.innerText = '开始计时';
                }
            }

            // 更新总累计时间
            document.getElementById('time-total').innerText = formatTime(totalSeconds);
        }

        // 核心高精度定时轮询
        function startLoop() {
            if (intervalId) clearInterval(intervalId);
            lastUpdateTime = Date.now();
            
            intervalId = setInterval(() => {
                if (activeSubject) {
                    const now = Date.now();
                    // 使用物理时间差校准，杜绝任何因系统休眠导致的漏秒、少秒
                    const delta = Math.floor((now - lastUpdateTime) / 1000);
                    
                    if (delta >= 1) {
                        timers[activeSubject] += delta;
                        lastUpdateTime += delta * 1000;
                        
                        // 毫秒级防丢失存储
                        localStorage.setItem(`timer_${activeSubject}`, timers[activeSubject]);
                        updateDisplay();
                    }
                }
            }, 200);
        }

        // 切换计时状态（包含纯互斥逻辑：点击一门，其他自动在后台保持原数据暂停）
        function toggleTimer(subject) {
            if (activeSubject === subject) {
                activeSubject = null; // 再次点击当前正在跑的学科，即暂停
            } else {
                activeSubject = subject; // 切换到新学科，旧的自动在后台保持不动
            }
            
            localStorage.setItem('active_subject', activeSubject || '');
            lastUpdateTime = Date.now();
            updateDisplay();
        }

        // 页面入口加载
        window.onload = function() {
            updateDisplay();
            startLoop();
        };

        // 切换标签页或手机息屏唤醒时，强制校准基准物理时间戳
        document.addEventListener('visibilitychange', () => {
            if (!document.hidden) {
                lastUpdateTime = Date.now();
            }
        });
    </script>
</body>
</html>
