<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study Tracker | 学习计时看板</title>
    <style>
        :root {
            --bg-color: #0d1117;
            --card-bg: #161b22;
            --text-main: #c9d1d9;
            --text-muted: #8b949e;
            --accent-cyan: #39c5bb; /* 极客科技感青色 */
            --accent-glow: rgba(57, 197, 187, 0.2);
            --danger-color: #f85149;
            --border-color: #30363d;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 2rem 1rem;
        }

        header {
            text-align: center;
            margin-bottom: 2rem;
        }

        header h1 {
            font-size: 2rem;
            font-weight: 600;
            letter-spacing: 1px;
            color: var(--text-main);
            margin-bottom: 0.5rem;
        }

        header p {
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        /* 学科网格布局 */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 1.5rem;
            width: 100%;
            max-width: 1200px;
        }

        /* 学科卡片样式 */
        .card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            position: relative;
            transition: all 0.3s ease;
        }

        /* 正在计时的卡片高亮效果 */
        .card.active {
            border-color: var(--accent-cyan);
            box-shadow: 0 0 15px var(--accent-glow);
        }

        .subject-name {
            font-size: 1.4rem;
            font-weight: bold;
            margin-bottom: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .subject-name .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: transparent;
        }

        .card.active .status-dot {
            background-color: var(--accent-cyan);
            animation: pulse 1.5s infinite;
        }

        .time-display {
            margin-bottom: 1.5rem;
        }

        .current-session {
            font-size: 2rem;
            font-family: 'Courier New', Courier, monospace;
            font-weight: bold;
            color: var(--text-main);
            margin-bottom: 0.25rem;
        }

        .card.active .current-session {
            color: var(--accent-cyan);
        }

        .total-accumulated {
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        /* 按钮设计 */
        .btn-group {
            display: flex;
            gap: 0.5rem;
            margin-top: auto;
        }

        button {
            flex: 1;
            padding: 0.75rem;
            border: none;
            border-radius: 6px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .btn-toggle {
            background-color: var(--border-color);
            color: var(--text-main);
        }

        .card.active .btn-toggle {
            background-color: var(--accent-cyan);
            color: #000;
        }

        .btn-toggle:hover {
            opacity: 0.9;
        }

        .btn-reset {
            background-color: transparent;
            color: var(--text-muted);
            border: 1px solid var(--border-color);
            flex: 0 0 60px;
            font-size: 0.8rem;
        }

        .btn-reset:hover {
            border-color: var(--danger-color);
            color: var(--danger-color);
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.3); opacity: 0.4; }
            100% { transform: scale(1); opacity: 1; }
        }

        @media (max-width: 600px) {
            .grid-container {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

    <header>
        <h1>STUDY TRACKER</h1>
        <p>专注于当下 · 互斥计时模式（开启一门将自动暂停其他学科）</p>
    </header>

    <div class="grid-container" id="timer-grid">
        </div>

    <script>
        // 初始化7个学科
        const subjectsConfig = [
            { id: 'math', name: '数学' },
            { id: 'physics', name: '物理' },
            { id: 'chemistry', name: '化学' },
            { id: 'biology', name: '生物' },
            { id: 'chinese', name: '语文' },
            { id: 'english', name: '英语' },
            { id: 'cs', name: 'CS' }
        ];

        // 从 LocalStorage 读取历史累计数据，若无则初始化
        let store = JSON.parse(localStorage.getItem('study_tracker_data')) || {};
        
        let activeSubjectId = null; 
        let timerInterval = null;
        let startTime = 0; // 本次跑表开始时的系统时间戳
        let passedTime = 0; // 本次跑表已经累计的时间（毫秒）

        // 格式化时间：毫秒 -> hh:mm:ss
        function formatTime(ms) {
            const totalSeconds = Math.floor(ms / 1000);
            const hours = Math.floor(totalSeconds / 3600);
            const minutes = Math.floor((totalSeconds % 3600) / 60);
            const seconds = totalSeconds % 60;

            const pad = (num) => String(num).padStart(2, '0');
            return `${pad(hours)}:${pad(minutes)}:${pad(seconds)}`;
        }

        // 初始化渲染页面
        const grid = document.getElementById('timer-grid');
        subjectsConfig.forEach(sub => {
            if (!store[sub.id]) {
                store[sub.id] = { total: 0 }; // 初始累计时间为0
            }

            const card = document.createElement('div');
            card.className = 'card';
            card.id = `card-${sub.id}`;
            card.innerHTML = `
                <div class="subject-name">
                    <span>${sub.name}</span>
                    <div class="status-dot"></div>
                </div>
                <div class="time-display">
                    <div class="current-session" id="current-${sub.id}">00:00:00</div>
                    <div class="total-accumulated" id="total-${sub.id}">累计: ${formatTime(store[sub.id].total)}</div>
                </div>
                <div class="btn-group">
                    <button class="btn-toggle" onclick="toggleTimer('${sub.id}')" id="btn-${sub.id}">开始计时</button>
                    <button class="btn-reset" onclick="resetTotal('${sub.id}')">重置</button>
                </div>
            `;
            grid.appendChild(card);
        });

        // 计时核心逻辑
        function toggleTimer(id) {
            // 情况1：点击了当前正在计时的学科 -> 停止计时
            if (activeSubjectId === id) {
                stopCurrentTimer();
                return;
            }

            // 情况2：点击了其他学科，且当前有学科正在计时 -> 先停掉旧的
            if (activeSubjectId !== null) {
                stopCurrentTimer();
            }

            // 启动新学科计时
            activeSubjectId = id;
            startTime = Date.now();
            passedTime = 0;

            document.getElementById(`card-${id}`).classList.add('active');
            document.getElementById(`btn-${id}`).innerText = '结束计时';

            // 核心：使用差值计算法，即使后台挂起，Date.now() 也是绝对准确的
            timerInterval = setInterval(() => {
                passedTime = Date.now() - startTime;
                document.getElementById(`current-${id}`).innerText = formatTime(passedTime);
            }, 200); // 200ms刷新一次UI保证丝滑
        }

        function stopCurrentTimer() {
            if (activeSubjectId === null) return;

            clearInterval(timerInterval);
            
            // 将本次跑表所得的精确毫秒数累加进总时间
            store[activeSubjectId].total += passedTime;
            localStorage.setItem('study_tracker_data', JSON.stringify(store));

            // 更新UI
            document.getElementById(`total-${activeSubjectId}`).innerText = `累计: ${formatTime(store[activeSubjectId].total)}`;
            document.getElementById(`current-${activeSubjectId}`).innerText = '00:00:00';
            document.getElementById(`card-${activeSubjectId}`).classList.remove('active');
            document.getElementById(`btn-${activeSubjectId}`).innerText = '开始计时';

            // 状态清空
            activeSubjectId = null;
            passedTime = 0;
        }

        // 重置某一学科的累计时间
        function resetTotal(id) {
            if (confirm(`确定要清空【${subjectsConfig.find(s => s.id === id).name}】的累计时间吗？`)) {
                if (activeSubjectId === id) {
                    clearInterval(timerInterval);
                    document.getElementById(`card-${id}`).classList.remove('active');
                    document.getElementById(`btn-${id}`).innerText = '开始计时';
                    activeSubjectId = null;
                }
                store[id].total = 0;
                passedTime = 0;
                localStorage.setItem('study_tracker_data', JSON.stringify(store));
                document.getElementById(`current-${id}`).innerText = '00:00:00';
                document.getElementById(`total-${id}`).innerText = `累计: ${formatTime(0)}`;
            }
        }

        // 页面关闭或刷新前，如果还在计时，自动保存
        window.onbeforeunload = function() {
            if (activeSubjectId !== null) {
                stopCurrentTimer();
            }
        };
    </script>
</body>
</html>
